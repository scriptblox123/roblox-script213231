<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Roblox Scripts | Разработка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at 20% 30%, #0a0a0a, #000000);
            color: #f0f0f0;
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            line-height: 1.5;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(1px 1px at 15% 30%, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 72% 18%, #ccc, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 45% 85%, #e0e0e0, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 88% 42%, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 5% 60%, #aaa, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 93% 77%, #f5f5f5, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 33% 12%, #ddd, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 67% 91%, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 49% 49%, #bbb, rgba(0,0,0,0)),
                radial-gradient(circle at 10% 70%, rgba(80,80,80,0.2) 0%, rgba(0,0,0,0) 25%),
                radial-gradient(circle at 90% 20%, rgba(150,150,150,0.15) 0%, rgba(0,0,0,0) 30%),
                radial-gradient(circle at 40% 85%, rgba(60,60,60,0.2) 0%, rgba(0,0,0,0) 20%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 8px);
            background-repeat: no-repeat, no-repeat, no-repeat, no-repeat, no-repeat, no-repeat, no-repeat, no-repeat, no-repeat, repeat, repeat, repeat, repeat;
            background-size: 200px 200px, 150px 150px, 100px 100px, 80px 80px, 120px 120px, 90px 90px, 180px 180px, 60px 60px, 130px 130px, 300px 300px, 400px 400px, 350px 350px, auto;
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .top-nav {
            position: relative;
            z-index: 10;
            width: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 2.5rem;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .nav-link {
            color: #f0f0f0;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 1px;
            padding: 0.5rem 1.5rem;
            border-radius: 3rem;
            transition: all 0.25s ease;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.15);
            flex: 1;
            text-align: center;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.15);
            color: white;
            border-color: rgba(255,255,255,0.6);
            transform: scale(1.02);
        }

        .hero {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 3rem 2rem;
            margin-bottom: 2.5rem;
            border: 1px solid rgba(255,255,255,0.25);
            text-align: center;
        }

        .hero h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
            margin-bottom: 1rem;
        }

        .discord-highlight {
            background: rgba(88, 101, 242, 0.2);
            border: 1px solid rgba(88, 101, 242, 0.6);
            display: inline-block;
            padding: 0.8rem 1.8rem;
            border-radius: 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 1rem;
            font-family: monospace;
            letter-spacing: 1px;
        }

        .discord-highlight span {
            color: #a0a0ff;
        }

        .discord-highlight-beta {
            background: rgba(0, 255, 255, 0.15);
            border: 1px solid rgba(0, 255, 255, 0.5);
            display: inline-block;
            padding: 0.8rem 1.8rem;
            border-radius: 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 1rem;
            font-family: monospace;
            letter-spacing: 1px;
        }

        .discord-highlight-beta span {
            color: #88ffff;
        }

        .btn {
            display: inline-block;
            background: white;
            color: black;
            padding: 0.75rem 2rem;
            border-radius: 3rem;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            margin: 0.5rem;
        }

        .btn-outline {
            background: transparent;
            color: white;
            border: 1px solid white;
        }

        .btn-outline:hover {
            background: white;
            color: black;
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
        }

        .search-container {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #444;
            border-radius: 3rem;
            padding: 0.3rem 0.3rem 0.3rem 1rem;
            transition: 0.2s;
        }

        .search-box:focus-within {
            border-color: white;
            background: #111;
        }

        .search-icon {
            font-size: 1.3rem;
            color: #aaa;
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            padding: 0.8rem 0;
            outline: none;
        }

        .search-input::placeholder {
            color: #666;
        }

        .search-btn {
            background: white;
            color: black;
            border: none;
            padding: 0.6rem 1.8rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.95rem;
        }

        .search-btn:hover {
            background: #ddd;
            transform: scale(1.02);
        }

        .script-card {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: all 0.25s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .script-card:hover {
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-3px);
            background: rgba(15, 15, 15, 0.9);
        }

        .script-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .script-name {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.3px;
        }

        .copy-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: 0.2s;
        }

        .copy-btn:hover {
            background: rgba(255,255,255,0.25);
            border-color: white;
            transform: scale(1.02);
        }

        .copy-btn.copied {
            background: #4CAF50;
            border-color: #4CAF50;
            color: white;
        }

        .script-code {
            background: #0a0a0a;
            border-radius: 1rem;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #ddd;
            border: 1px solid #333;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .results-area {
            margin-top: 0.5rem;
        }

        .no-results {
            text-align: center;
            color: #888;
            padding: 2rem;
            background: rgba(0,0,0,0.4);
            border-radius: 1rem;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            padding: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.15);
            color: #aaa;
            font-size: 0.85rem;
        }

        .page-section {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .page-section.active-section {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }

        @media (max-width: 700px) {
            .wrapper {
                padding: 1rem;
            }
            .hero h1 {
                font-size: 2rem;
            }
            .hero {
                padding: 1.5rem;
            }
            .nav-container {
                gap: 1rem;
            }
            .nav-link {
                font-size: 1rem;
                padding: 0.4rem 0.8rem;
            }
            .script-name {
                font-size: 1.2rem;
            }
            .search-box {
                flex-wrap: wrap;
                padding: 0.5rem;
            }
            .search-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-container">
        <a href="#" class="nav-link" data-page="home">HOME</a>
        <a href="#" class="nav-link" data-page="script">SCRIPT</a>
    </div>
</div>

<div class="wrapper">
    <div id="homeSection" class="page-section active-section">
        <section class="hero">
            <h1>A WEBSITE FOR ROBLOX SCRIPTS</h1>
            <p style="font-size: 1.4rem; font-weight: 500;">⚡ IS UNDER DEVELOPMENT ⚡</p>
            
            <div class="discord-highlight">
                💬 DEVELOPER DISCORD: <span>RST000</span>
            </div>
            
            <div class="discord-highlight-beta">
                🧪 BETA-TESTER DISCORD: <span>holirik</span>
            </div>
            
            <div style="margin-top: 2rem; display: flex; justify-content: center; flex-wrap: wrap; gap: 1rem;">
                <a href="https://discordapp.com/users/1479897289047933039" target="_blank" class="btn btn-outline">👨‍💻 Developer Profile</a>
                <a href="https://discordapp.com/users/1476167244148113481" target="_blank" class="btn btn-outline">🧪 Beta-Tester Profile</a>
            </div>
        </section>
    </div>

    <div id="scriptSection" class="page-section">
        <section class="hero">
            <h1>⚡ SCRIPT</h1>
            <p style="font-size: 1rem; margin-top: 0.5rem; opacity: 0.8;">Поиск и копирование скриптов</p>
        </section>

        <div class="search-container">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="searchInput" placeholder="Введите название скрипта... например: Fly GUI V3">
                <button class="search-btn" id="searchBtn">SEARCH</button>
            </div>
        </div>

        <div class="results-area" id="resultsArea"></div>
    </div>

    <footer>
        <p>© 2025 Roblox Scripts | Разработчик: RST000 | Все права защищены</p>
    </footer>
</div>

<script>
    // БАЗА ДАННЫХ СКРИПТОВ (ДОБАВЛЕН НОВЫЙ СКРИПТ)
    const scriptsDatabase = [
        {
            name: "Fly GUI V3",
            code: `loadstring(game:HttpGet("https://pasterfy.app/TOXICU4j/raw"))()`
        },
        {
            name: "The Strongest Battlegrounds",
            code: `loadstring(game:HttpGet("https://raw.githubusercontent.com/officialakira/Akira-Hub/refs/heads/main/akira%20tech.lua"))()`
        }
        // 👇 НОВЫЕ СКРИПТЫ ДОБАВЛЯЙ СЮДА:
        // {
        //     name: "Название скрипта",
        //     code: `код скрипта`
        // },
    ];

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderScripts(scriptsToShow) {
        const resultsArea = document.getElementById('resultsArea');
        
        if (!scriptsToShow || scriptsToShow.length === 0) {
            resultsArea.innerHTML = '<div class="no-results">🔍 Ничего не найдено. Попробуйте другой запрос.</div>';
            return;
        }

        let html = '';
        for (let i = 0; i < scriptsToShow.length; i++) {
            const script = scriptsToShow[i];
            const originalCode = script.code;
            html += `
                <div class="script-card" data-script-id="${i}">
                    <div class="script-header">
                        <div class="script-name">📜 ${escapeHtml(script.name)}</div>
                        <button class="copy-btn" data-code="${escapeHtml(originalCode).replace(/"/g, '&quot;')}">
                            📋 Копировать
                        </button>
                    </div>
                    <div class="script-code">${escapeHtml(originalCode)}</div>
                </div>
            `;
        }
        resultsArea.innerHTML = html;

        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                let encodedCode = btn.getAttribute('data-code');
                let textarea = document.createElement('textarea');
                textarea.innerHTML = encodedCode;
                let codeToCopy = textarea.value;
                
                try {
                    await navigator.clipboard.writeText(codeToCopy);
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '✅ Скопировано!';
                    btn.classList.add('copied');
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.classList.remove('copied');
                    }, 2000);
                } catch (err) {
                    console.error('Ошибка копирования:', err);
                    const textArea = document.createElement('textarea');
                    textArea.value = codeToCopy;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '✅ Скопировано!';
                    btn.classList.add('copied');
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.classList.remove('copied');
                    }, 2000);
                }
            });
        });
    }

    function searchScripts() {
        const query = document.getElementById('searchInput').value.trim().toLowerCase();
        
        if (query === "") {
            renderScripts(scriptsDatabase);
            return;
        }

        const filtered = scriptsDatabase.filter(script => 
            script.name.toLowerCase().includes(query)
        );
        
        renderScripts(filtered);
    }

    document.getElementById('searchBtn').addEventListener('click', searchScripts);
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            searchScripts();
        }
    });

    const homeSection = document.getElementById('homeSection');
    const scriptSection = document.getElementById('scriptSection');
    const navLinks = document.querySelectorAll('.nav-link');

    function showPage(pageId) {
        if (pageId === 'home') {
            homeSection.classList.add('active-section');
            scriptSection.classList.remove('active-section');
        } else if (pageId === 'script') {
            scriptSection.classList.add('active-section');
            homeSection.classList.remove('active-section');
            renderScripts(scriptsDatabase);
        }
        navLinks.forEach(link => {
            if (link.getAttribute('data-page') === pageId) {
                link.style.background = 'rgba(255,255,255,0.2)';
                link.style.borderColor = 'white';
            } else {
                link.style.background = 'rgba(255,255,255,0.03)';
                link.style.borderColor = 'rgba(255,255,255,0.15)';
            }
        });
    }

    navLinks.forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            const page = link.getAttribute('data-page');
            showPage(page);
        });
    });

    showPage('home');
</script>
</body>
</html>
